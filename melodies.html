<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>micro:bit Melodies</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    padding: 40px 24px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .card:hover { background: #202020; border-color: #444; }
  .card.active { border-color: #4caf50; background: #1a231a; }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .card-name { font-size: 15px; font-weight: 600; color: #fff; }
  .play-btn {
    background: #2a2a2a;
    border: none;
    border-radius: 6px;
    color: #ccc;
    font-size: 18px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .play-btn:hover { background: #3a3a3a; color: #fff; }
  .play-btn.playing { color: #4caf50; }
  .card-desc { font-size: 12px; color: #777; margin-bottom: 12px; }
  .notes {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: #555;
    background: #111;
    border-radius: 6px;
    padding: 8px 10px;
    word-break: break-all;
    line-height: 1.6;
  }
  .card.active .notes { color: #6dbf6d; }
  .selected-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1a231a;
    border-top: 1px solid #4caf50;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    transform: translateY(100%);
    transition: transform 0.2s;
  }
  .selected-bar.visible { transform: translateY(0); }
  .selected-label { font-size: 13px; color: #4caf50; font-weight: 600; }
  .copy-btn {
    background: #4caf50;
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .copy-btn:hover { background: #5dc960; }
  .copy-code {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast {
    position: fixed;
    top: 20px; right: 20px;
    background: #4caf50;
    color: #000;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>micro:bit Trigger Melodies</h1>
<p class="sub">Click a card to select, ▶ to preview. Copy the snippet into main.py.</p>

<div class="grid" id="grid"></div>
<div class="selected-bar" id="bar">
  <span class="selected-label" id="bar-name"></span>
  <span class="copy-code" id="bar-code"></span>
  <button class="copy-btn" onclick="copySelected()">Copy</button>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const melodies = [
  {
    name: "Rising Chord",
    desc: "Current — triumphant, positive",
    notes: ["C4:2", "E4:2", "G4:2", "C5:4"]
  },
  {
    name: "Alert Beeps",
    desc: "Sharp & urgent — 3 quick beeps",
    notes: ["A5:1", "R:1", "A5:1", "R:1", "A5:1"]
  },
  {
    name: "Laser Shot",
    desc: "Sci-fi descend — quick and punchy",
    notes: ["E5:1", "D5:1", "C5:1", "A4:2"]
  },
  {
    name: "Coin",
    desc: "Classic pickup sound",
    notes: ["E5:1", "G5:3"]
  },
  {
    name: "Fanfare",
    desc: "Short brass-style announcement",
    notes: ["C4:1", "C4:1", "C4:1", "E4:4", "D4:2", "F4:6"]
  },
  {
    name: "Low Thud",
    desc: "Dark and dramatic — low impact",
    notes: ["C2:1", "B1:1", "A1:3"]
  },
  {
    name: "Bleep Bloop",
    desc: "Retro game feel",
    notes: ["G4:1", "C5:1", "G4:1", "C5:3"]
  },
  {
    name: "Power Up",
    desc: "Ascending arpeggio — energetic",
    notes: ["C4:1", "E4:1", "G4:1", "B4:1", "C5:4"]
  },
  {
    name: "Sad Trombone",
    desc: "Wah-wah-wah — comedic",
    notes: ["B4:2", "A4:2", "G4:2", "E4:8"]
  },
  {
    name: "Double Beep",
    desc: "Clean and minimal",
    notes: ["C5:2", "R:1", "C5:2"]
  },
];

// Note frequencies
const noteFreqs = {
  C1:33,D1:37,E1:41,F1:44,G1:49,A1:55,B1:62,
  C2:65,D2:73,E2:82,F2:87,G2:98,A2:110,B2:123,
  C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,
};

let audioCtx = null;
let selected = null;
let playingIdx = null;
let stopFn = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function parseNote(n) {
  const [note, dur] = n.split(':');
  const beats = parseInt(dur) || 1;
  const ms = beats * 125;
  if (note === 'R') return { freq: 0, ms };
  const freq = noteFreqs[note] || 440;
  return { freq, ms };
}

function playMelody(notes, idx, btn) {
  if (stopFn) { stopFn(); stopFn = null; }
  if (playingIdx === idx) { playingIdx = null; btn.textContent = '▶'; return; }

  const ctx = getAudioCtx();
  playingIdx = idx;
  btn.textContent = '⏹';
  btn.classList.add('playing');

  let cancelled = false;
  let i = 0;

  function playNext() {
    if (cancelled || i >= notes.length) {
      if (!cancelled) { btn.textContent = '▶'; btn.classList.remove('playing'); playingIdx = null; }
      return;
    }
    const { freq, ms } = parseNote(notes[i++]);
    if (freq > 0) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000 - 0.01);
      osc.start(); osc.stop(ctx.currentTime + ms / 1000);
    }
    setTimeout(playNext, ms);
  }

  stopFn = () => { cancelled = true; btn.textContent = '▶'; btn.classList.remove('playing'); playingIdx = null; };
  playNext();
}

function selectCard(idx) {
  selected = idx;
  document.querySelectorAll('.card').forEach((c, i) => c.classList.toggle('active', i === idx));
  const m = melodies[idx];
  const snippet = `music.play([${m.notes.map(n => `'${n}'`).join(', ')}], wait=True)`;
  document.getElementById('bar-name').textContent = m.name;
  document.getElementById('bar-code').textContent = snippet;
  document.getElementById('bar').classList.add('visible');
}

function copySelected() {
  if (selected === null) return;
  const m = melodies[selected];
  const snippet = `music.play([${m.notes.map(n => `'${n}'`).join(', ')}], wait=True)`;
  navigator.clipboard.writeText(snippet);
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Render
const grid = document.getElementById('grid');
melodies.forEach((m, idx) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-name">${m.name}</span>
      <button class="play-btn" title="Preview">▶</button>
    </div>
    <div class="card-desc">${m.desc}</div>
    <div class="notes">${m.notes.map(n => `'${n}'`).join(', ')}</div>
  `;
  card.querySelector('.play-btn').addEventListener('click', e => {
    e.stopPropagation();
    playMelody(m.notes, idx, e.currentTarget);
  });
  card.addEventListener('click', () => selectCard(idx));
  grid.appendChild(card);
});
</script>
</body>
</html>
